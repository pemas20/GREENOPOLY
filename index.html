<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenopoly Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="leaf-container"></div>

    <div class="arcade-cabinet-wide">
        
        <div class="arcade-panel admin-sidebar">
            <div class="panel-title">MENU UTAMA</div>
            
            <div class="input-block">
                <label>MASUKAN NAMA PESERTA:</label>
                <input type="text" id="newPlayerName" placeholder="KETIK NAMA PESERTA..." onkeypress="handleKeyPress(event)">
                <button class="btn-arcade btn-green" onclick="addNewPlayer()">[ TAMBAH PESERTA ]</button>
            </div>
            
            <div class="input-block" style="margin-top: 15px; border-top: 2px dashed #2ed573; padding-top: 10px;">
    <label>TIMER (MENIT:DETIK):</label>
    <div style="display:flex; gap:5px;">
        <input type="number" id="timerMin" placeholder="M" style="width: 50%;">
        <input type="number" id="timerSec" placeholder="D" style="width: 50%;">
    </div>
    <button class="btn-arcade btn-green" onclick="startManualTimer()" style="margin-top:5px;">[ START TIMER ]</button>
    <div id="timerDisplay" style="text-align: center; font-size: 24px; color: #ff4757; margin-top: 10px; font-weight: bold;">0:00</div>
</div>
            
            
            <div class="activity-log-container">
                <div class="log-title">> LIVE ACTIVITY LOG</div>
                <div class="log-box" id="activityLogBox">
                    <div class="log-item system-msg">[SYSTEM] READY TO PLAY!</div>
                </div>
            </div>

            <div class="utility-zone">
                <button class="btn-arcade btn-reset" onclick="resetAllPoints()">[ RESET ALL POINTS ]</button>
                <button class="btn-arcade btn-fullscreen" onclick="toggleFullscreen()">[ LAUNCH FULLSCREEN ]</button>
            </div>

            <div class="instructions">
                <p>> INPUT ANGKA POIN DI SINI</p>
                <p>> TEKAN 'F' / 'ESC' UNTUK SCREEN CONTROLL</p>
            </div>
        </div>

        <div class="arcade-panel stage-main-wide">
            <div class="stage-header">
                <h1 class="pixel-title">GREENOPOLY LEADERBOARD</h1>
                <div class="marquee-live"><span class="blink-dot"></span> LIVE 8-BIT STAGE</div>
            </div>

            <div class="podium-zone-wide" id="podiumContainer"></div>
            <div class="list-zone-wide">
                <div class="scroll-box" id="listContainer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
